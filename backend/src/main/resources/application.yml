spring:
  application:
    name: gguljob-backend

  # Base Profile (Default: local)
  profiles:
    active: local

  threads:
    virtual:
      enabled: true

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
          gitlab:
            client-id: ${GITLAB_CLIENT_ID}
            client-secret: ${GITLAB_CLIENT_SECRET}

# Security (JWT)
jwt:
  secret: ${JWT_SECRET:default-jwt-secret-key-please-change-in-production}
  access-minutes: ${JWT_ACCESS_MINUTES:2880}
  refresh-days: ${JWT_REFRESH_DAYS:14}

app:
  frontend:
    redirect-url: ${APP_FRONTEND_REDIRECT_URL}

# API Documentation (Swagger)
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    groups-order: DESC
    operations-sorter: method
  api-docs:
    path: /api-docs

gms:
  api:
    key: ${GMS_API_KEY}

cdn:
  url: ${CDN_URL}

cloud:
  aws:
    s3:
      bucket: ${S3_BUCKET_NAME}
    region:
      static: ap-northeast-2
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}