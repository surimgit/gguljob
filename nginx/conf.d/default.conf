server {
    listen 80;
    server_name j14e107.p.ssafy.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name j14e107.p.ssafy.io;

    client_max_body_size 50M;
    
    ssl_certificate /etc/letsencrypt/live/j14e107.p.ssafy.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/j14e107.p.ssafy.io/privkey.pem;

    resolver 127.0.0.11 valid=5s;

    include /etc/nginx/conf.d/service-url.inc;

    # =========================================================
    # 프론트엔드 (React + Vite) 라우팅
    # 도메인(https://j14e107.p.ssafy.io) 접속 시 React 화면을 보여줌
    # =========================================================

    location / {
        # React 컨테이너 내부의 Nginx가 80번 포트로 기다리고 있습니다.
        set $frontend "http://frontend:80";
        proxy_pass $frontend;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 웹소켓 지원 (React 핫 리로딩이나 채팅 기능 대비)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # =========================================================
    # 백엔드 (Spring Boot) API 라우팅
    # 프론트엔드가 데이터를 요청할 때 (/api/...) 백엔드(Blue/Green)로 넘김
    # =========================================================

    location /api {
        proxy_pass $service_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE 전용 (실시간 알림)
    location /api/v1/notifications/subscribe {
        proxy_pass $service_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        keepalive_timeout 3600s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
    }

    location /jenkins {
        proxy_pass http://jenkins:8080/jenkins;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GitLab Webhook 지원 (/project/ 로 들어오는 요청을 /jenkins/project/ 로 전달)
    location /project/ {
        proxy_pass http://jenkins:8080/jenkins/project/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /portainer {
        return 301 /portainer/;
    }

    # Portainer timeout 페이지가 루트(/timeout.html)로 떨어질 때 502 대신
    # 다시 /portainer/로 보내서 접근이 끊기지 않게 처리
    location = /timeout.html {
        return 302 /portainer/;
    }

    location = /favicon.ico {
        return 204;
    }

    # Portainer (별도 컨테이너, 호스트 포트 9000 사용)
    location /portainer/ {
        auth_basic "Restricted Area - Portainer Admin Only";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;

        proxy_pass http://gguljob-portainer:9000/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /portainer;
        
        # WebSocket 지원 (Console 접속 등)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
}