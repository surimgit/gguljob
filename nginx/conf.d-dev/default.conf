server {
    listen 80;
    server_name j14e107.p.ssafy.io;
    return 301 https://$server_name:8443$request_uri;
}

server {
    listen 443 ssl;
    server_name j14e107.p.ssafy.io;

    client_max_body_size 50M;

    ssl_certificate /etc/letsencrypt/live/j14e107.p.ssafy.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/j14e107.p.ssafy.io/privkey.pem;

    # [핵심 1] 도커 내부 DNS 등록 (변수 사용을 위해 필수)
    resolver 127.0.0.11 valid=5s;

    # [핵심 2] 현재 활성화된 서비스 주소 로드
    include /etc/nginx/conf.d/service-url.inc;

    # =========================================================
    # (React + Vite) 라우팅
    # 도메인(https://...)으로 들어오면 무조건 여기로 보냄
    # =========================================================
    location / {
        set $frontend_url http://gguljob-frontend-dev:80;
        
        proxy_pass $frontend_url;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # =========================================================
    # 백엔드 (Spring Boot) API 라우팅
    # 프론트엔드가 /api 로 시작하는 요청을 보내면 백엔드로 토스
    # =========================================================
    location /api {
        # service-url.inc에 정의된 변수 ($service_url) 사용
        proxy_pass $service_url;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # (선택사항) 백엔드에서 CORS 처리를 안 하고 Nginx에서 하려면 여기서 헤더 추가 가능
        # 하지만 지금 구조(Proxy)에서는 Same-Origin으로 인식되어 CORS 문제 없음!
    }

    # Swagger/OpenAPI docs should go to backend, not frontend.
    location = /swagger-ui.html {
        proxy_pass $service_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /swagger-ui/ {
        proxy_pass $service_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api-docs {
        proxy_pass $service_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}